services:
  - type: web
    name: stonks-backend
    runtime: python
    region: oregon
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        value: sqlite+aiosqlite:///./stonks.db
      - key: SYNC_DATABASE_URL
        value: sqlite:///./stonks.db
      - key: PYTHON_VERSION
        value: 3.11.0
