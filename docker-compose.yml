version: "3.8"

services:
  backend:
    build:
      context: .
      target: backend
    container_name: stonks-backend
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - sqlite-data:/app
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./stonks.db
      - SYNC_DATABASE_URL=sqlite:///./stonks.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: .
      target: frontend
    container_name: stonks-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  sqlite-data:
